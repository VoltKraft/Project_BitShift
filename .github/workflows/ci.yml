name: CI

on:
  push:
    branches: [main, WIP]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/api/pyproject.toml
      - name: Install API dependencies
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run pytest
        working-directory: services/api
        env:
          DATABASE_URL: postgresql+psycopg://ignored:ignored@localhost:5432/ignored
          SESSION_SECRET: test-secret-test-secret-test-secret!
        run: pytest -q

  openapi-spec-check:
    name: API · OpenAPI spec drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/api/pyproject.toml
      - name: Install dependencies
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Regenerate OpenAPI
        working-directory: services/api
        env:
          DATABASE_URL: postgresql+psycopg://ignored:ignored@localhost:5432/ignored
          SESSION_SECRET: test-secret-test-secret-test-secret!
        run: |
          python -m app.cli dump-openapi --output ../../docs/api/openapi/api/openapi.yaml
      - name: Fail if committed spec is stale
        run: |
          if ! git diff --exit-code -- docs/api/openapi/api/openapi.yaml; then
            echo "::error::Committed OpenAPI spec is stale; run 'python -m app.cli dump-openapi' locally and commit the result."
            exit 1
          fi

  frontend-build:
    name: Frontend · tsc + vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json
      - name: Install
        working-directory: services/frontend
        run: npm ci || npm install
      - name: Build
        working-directory: services/frontend
        run: npm run build

  docker-build:
    name: Docker · build sanity
    runs-on: ubuntu-latest
    needs: [api-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: false
          load: true
          tags: chronos_api:ci
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: services/worker
          push: false
          load: true
          tags: chronos_worker:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: services/frontend
          push: false
          load: true
          tags: chronos_frontend:ci
